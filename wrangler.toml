name = "quota"
workers_dev = true
# Deploy uses Astro-generated dist/server/wrangler.json (run `pnpm build` then
# `wrangler deploy -c dist/server/wrangler.json`). This root config supplies the
# bindings the adapter merges in. Binding names are stable: DB (D1), FILES (R2), SESSION (KV).
#
# SELF-HOSTERS: the ids below are the maintainer's resources. Replace them with your
# own after `wrangler d1 create quota`, `wrangler r2 bucket create quota-files`,
# `wrangler kv namespace create quota-session`. Resource ids are not secrets, but they
# point at the maintainer's account — your deploy must use yours. See DEPLOY.md.
compatibility_date = "2026-06-12"
compatibility_flags = ["nodejs_compat"]

[assets]
binding = "ASSETS"
directory = "./dist"

[[d1_databases]]
binding = "DB"
database_name = "quota"
database_id = "43fb8040-cca2-4da4-b9bf-e456a6755922"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "FILES"
bucket_name = "quota-files"

[[kv_namespaces]]
binding = "SESSION"
id = "db327ea7a9734fceac91aa806125a3ba"
