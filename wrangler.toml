name = "quota"
# Deploy uses Astro-generated dist/server/wrangler.json; this root config is for local/test bindings.
compatibility_date = "2026-06-12"
compatibility_flags = ["nodejs_compat"]

[assets]
binding = "ASSETS"
directory = "./dist"

[[d1_databases]]
binding = "DB"
database_name = "quota-dev"
database_id = "00000000-0000-0000-0000-000000000000"

[[r2_buckets]]
binding = "FILES"
bucket_name = "quota-files-dev"
